<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloNotes AI - Phiên Bản Đại Gia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --main: #FFDEE9; --accent: #6B4EFF; --text: #2D3748; }
        body { background: linear-gradient(135deg, #FFDEE9, #B5FFFC); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Quicksand', sans-serif; margin: 0; }
        .app-container { width: 95%; max-width: 400px; height: 85vh; background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); border-radius: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 2px solid white; overflow: hidden; }
        .header { padding: 20px; text-align: center; background: white; font-size: 20px; font-weight: 700; color: var(--accent); border-bottom: 1px solid #eee; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; }
        .user-msg { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .ai-msg { background: white; color: var(--text); align-self: flex-start; border-bottom-left-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .input-bar { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; border: 2px solid #eee; padding: 12px; border-radius: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .loading { font-size: 12px; color: #718096; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">✨ HoloNotes AI Pro ✨</div>
        <div class="chat-area" id="chatArea">
            <div class="msg ai-msg">Chào đại gia nha! Nay có tiền đăng ký Pro rồi, tui sẽ phục vụ cưng hết mình. Tiêu gì khai mau?</div>
        </div>
        <div id="loading" style="text-align:center; display:none; font-size:12px; color:purple;">Đang vặn não...</div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Hôm nay tui ăn bún bò 50k..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Gửi</button>
        </div>
    </div>

    <script>
        // DÁN API KEY MỚI CỦA ĐẠI GIA VÀO ĐÂY
        const API_KEY = "AIzaSyBPIAiIYCLnlLTus4dP5_o6vtKk_qvN2xw"; 

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatArea');
            const load = document.getElementById('loading');
            const text = input.value.trim();
            if (!text) return;

            // Hiện tin nhắn user
            chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = "";
            load.style.display = "block";
            chat.scrollTop = chat.scrollHeight;

            try {
                // Sử dụng model 1.5-pro cho xịn
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Bạn là một trợ lý ảo miền Nam lầy lội, nanh nọc. User vừa nói: " + text + ". Hãy trả lời khịa họ một câu và nhắc lại số tiền nếu có." }] }]
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;

                // Hiện tin nhắn AI
                load.style.display = "none";
                chat.innerHTML += `<div class="msg ai-msg">${aiReply}</div>`;
                chat.scrollTop = chat.scrollHeight;

                // BẬT MỎ NÓI
                if (window.responsiveVoice) {
                    responsiveVoice.speak(aiReply, "Vietnamese Female", {rate: 1.1, pitch: 1});
                }

            } catch (error) {
                load.style.display = "none";
                chat.innerHTML += `<div class="msg ai-msg">Ôi trời, kẹt lệnh rồi! Coi lại cái mã API đi cưng ơi.</div>`;
            }
        }
    </script>
</body>
</html>
