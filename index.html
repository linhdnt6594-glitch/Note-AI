<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloNotes AI - Phiên Bản Siêu Cấp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root {
            --hologram-pink: #FFDEE9; --hologram-mint: #B5FFFC; --hologram-purple: #DCD0FF;
            --glass-bg: rgba(255, 255, 255, 0.45); --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2D3748; --accent: #6B4EFF; --border-radius-xl: 32px;
        }
        body {
            background: linear-gradient(135deg, var(--hologram-pink), var(--hologram-purple), var(--hologram-mint));
            background-size: 200% 200%; animation: holoShift 10s ease infinite; color: var(--text-main); min-height: 100vh;
            display: flex; justify-content: center; align-items: center; font-family: 'Outfit', sans-serif; margin: 0;
        }
        @keyframes holoShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .app-container {
            width: 100%; max-width: 440px; height: 90vh; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(20px);
            border-radius: var(--border-radius-xl); border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .chat-bubble { background: white; padding: 15px; border-radius: 20px 20px 5px 20px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-weight: 600; font-family: 'Quicksand'; color: #4A5568; }
        .input-bar { padding: 20px; display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 12px; border-radius: 15px; border: 1px solid #eee; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; }
        .finance-item { background: white; padding: 10px; border-radius: 10px; margin-top: 5px; display: flex; justify-content: space-between; font-weight: 700; }
        .amount { color: #FF6B6B; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="workspace" id="ws">
            <div class="chat-bubble">Chào cưng! Hôm nay tiêu gì thì khai mau để tui ghi sổ nè.</div>
            <div id="financeList"></div>
        </div>
        <div class="input-bar">
            <input type="text" id="inp" placeholder="Ví dụ: Ăn sáng 30k...">
            <button onclick="sendAI()">Gửi</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng"; // Đã dán não cho cưng!

        async function sendAI() {
            const val = document.getElementById('inp').value;
            if(!val) return;
            
            document.getElementById('ws').innerHTML += `<div class='chat-bubble' style='background:#E2E8F0; align-self:flex-end'>${val}</div>`;
            document.getElementById('inp').value = "";

            const sysPrompt = `Bạn là trợ lý ảo miền Nam nanh nọc. User nói họ mua gì đó, hãy tách tiền. 
            Luôn trả lời JSON: {"reply": "câu trả lời", "item": "tên món", "price": số_tiền}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: sysPrompt + "\nUser: " + val }] }] })
                });
                const data = await res.json();
                const cleanText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(cleanText);

                document.getElementById('ws').innerHTML += `<div class='chat-bubble'>${result.reply}</div>`;
                if(result.price > 0) {
                    document.getElementById('financeList').innerHTML += `<div class='finance-item'><span>${result.item}</span><span class='amount'>-${result.price.toLocaleString()}đ</span></div>`;
                    responsiveVoice.speak(result.reply, "Vietnamese Female");
                }
            } catch(e) {
                document.getElementById('ws').innerHTML += `<div class='chat-bubble'>Lỗi rồi cưng, chắc cái mã AI bị ai hốt rồi!</div>`;
            }
        }
    </script>
</body>
</html>
