<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clean Notes Premium</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        
        <div class="toast" id="toast">Ghi chú đã thêm!</div>

        <!-- Floating Action Button -->
        <div class="fab-btn" onclick="openAddModal('Personal')">
            <span class="material-icons-round">add</span>
        </div>

        <!-- HOME VIEW -->
        <div id="home-view" class="view-section active">
            <header>
                <h1 id="greeting">Ghi chú</h1>
            </header>

            <!-- Work Section -->
            <div class="category-section">
                <div class="category-header">
                    <span class="category-title">Work</span>
                    <button class="add-quick-btn" onclick="openAddModal('Work')">
                        <span class="material-icons-round">add</span> Thêm
                    </button>
                </div>
                <div class="note-list" id="list-Work"></div>
            </div>

            <!-- Study Section -->
            <div class="category-section">
                <div class="category-header">
                    <span class="category-title">Study</span>
                    <button class="add-quick-btn" onclick="openAddModal('Study')">
                        <span class="material-icons-round">add</span> Thêm
                    </button>
                </div>
                <div class="note-list" id="list-Study"></div>
            </div>

            <!-- Personal Section -->
            <div class="category-section">
                <div class="category-header">
                    <span class="category-title">Personal</span>
                    <button class="add-quick-btn" onclick="openAddModal('Personal')">
                        <span class="material-icons-round">add</span> Thêm
                    </button>
                </div>
                <div class="note-list" id="list-Personal"></div>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settings-view" class="view-section">
            <header style="padding: 40px 0 20px;">
                <h1>Cài đặt</h1>
            </header>
            <div class="settings-list">
                <div class="settings-item">
                    <span>Chế độ Tối</span>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <p style="text-align:center; color: var(--text-muted); font-size: 13px; margin-top:30px; font-weight:500;">Phiên bản 2.1 - Premium Split</p>
        </div>

        <!-- TAB BAR -->
        <div class="tab-bar">
            <div class="tab-item active" id="tab-home" onclick="switchTab('home')">
                <span class="material-icons-round">description</span>
                <span class="tab-label">Home</span>
            </div>
            <!-- Removed middle Add tab to keep it minimal, relying on FAB -->
            <div class="tab-item" id="tab-settings" onclick="switchTab('settings')">
                <span class="material-icons-round">settings</span>
                <span class="tab-label">Settings</span>
            </div>
        </div>

        <!-- ADD NOTE MODAL -->
        <div class="modal-overlay" id="add-modal">
            <div class="modal-card">
                <div class="modal-content">
                    <p class="modal-title">Ghi chú mới</p>
                    <p class="modal-desc" id="mic-status">Nhập chữ hoặc dùng giọng nói</p>
                    <input type="text" id="note-input" class="modal-input" placeholder="Nội dung ghi chú..." autocomplete="off">
                    <select id="note-category" class="modal-select">
                        <option value="Work">Work</option>
                        <option value="Study">Study</option>
                        <option value="Personal">Personal</option>
                    </select>
                    <div class="mic-wrapper">
                        <button class="mic-btn-main" id="mic-btn" onclick="toggleVoice()">
                            <span class="material-icons-round">mic</span>
                        </button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn destructive" onclick="closeModal()">Hủy</button>
                    <button class="modal-btn" onclick="saveNoteFromModal()">Thêm</button>
                </div>
            </div>
        </div>

    </div> <!-- End App Container -->

    <!-- Link JS -->
    <script src="script.js"></script>
</body>
</html>
